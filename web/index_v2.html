<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senlings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0d0d0b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── リセット・ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0b;
      color: #e8e4d8;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }

    /* ── アプリコンテナ（幅制御） ── */
    #app {
      width: 100%;
      max-width: 430px;
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── 画面コンテナ ── */
    .screen {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 0 0 80px;
      width: 100%;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ── 下部タブバー ── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      background: #0d0d0b;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px 20px;
      background: none;
      border: none;
      border-top: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
      gap: 5px;
    }
    .tab .tab-icon-svg {
      width: 22px;
      height: 22px;
      color: #a0a0a0;
    }
    .tab .tab-label {
      font-size: 11px;
      color: #a0a0a0;
      letter-spacing: 0.12em;
      font-family: 'Noto Serif JP', serif;
      font-weight: 500;
    }
    .tab.active {
      border-top: 2px solid #c5a059;
      box-shadow: 0 -2px 8px rgba(197, 160, 89, 0.3);
    }
    .tab.active .tab-icon-svg { color: #c5a059; }
    .tab.active .tab-label    { color: #c5a059; font-weight: 700; }
    .tab-icon-svg {
      display: block;
    }

    /* ── 画面1: 現場トップ ── */
    .site-top-header {
      padding: 28px 20px 16px;
    }
    .site-top-eyebrow {
      color: #c5a059;
      font-size: 11px;
      letter-spacing: 0.4em;
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    .site-top-heading {
      font-size: 20px;
      font-weight: 300;
      color: #e8e4d8;
      line-height: 1.5;
    }

    /* 現場カード一覧 */
    .site-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .site-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      padding: 18px 20px 18px 24px;
      min-height: 72px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-left: 4px solid #c5a059;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .site-card:active {
      background: #1e1e1a;
      border-color: #333;
    }
    .site-slug {
      font-size: 18px;
      font-weight: 500;
      color: #e8e5df;
      letter-spacing: 0.05em;
    }
    .site-address {
      font-size: 14px;
      font-weight: 300;
      color: #c0c0c0;
    }

    /* 空状態 */
    .site-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: #4a4a42;
      font-weight: 300;
    }

    /* 「現場が見つからない場合」導線 */
    .site-fallback {
      margin: 28px 20px 0;
      padding: 0;
    }
    .site-fallback-label {
      font-size: 12px;
      color: #888880;
      margin-bottom: 12px;
      letter-spacing: 0.15em;
      font-family: 'Noto Serif JP', serif;
    }
    .site-fallback-links {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .site-fallback-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #1e1e1a;
      font-size: 14px;
      color: #e8e5df;
      font-weight: 300;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }
    .site-fallback-link::after {
      content: '›';
      font-size: 18px;
      color: #c5a059;
    }
    .site-fallback-link:last-child { border-bottom: none; }

    /* ── 画面2: 申し送り ── */
    .screen-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1a;
      gap: 12px;
    }
    .back-btn {
      color: #c5a059;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      font-family: inherit;
      line-height: 1;
    }
    .screen-title {
      color: #e8e5df;
      font-size: 16px;
      font-weight: 500;
    }
    .screen-subtitle {
      font-family: 'Noto Serif JP', serif;
      color: #a0a0a0;
      font-size: 12px;
      padding: 12px 20px 8px;
      letter-spacing: 0.1em;
    }
    .handover-item {
      border-bottom: 1px solid #1e1e1a;
    }
    .handover-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .handover-label {
      color: #e8e5df;
      font-size: 15px;
      font-weight: 400;
    }
    .handover-chevron {
      color: #c5a059;
      font-size: 18px;
      transition: transform 0.2s;
    }
    .handover-item.open .handover-chevron {
      transform: rotate(90deg);
    }
    .handover-body {
      padding: 0 20px 16px 20px;
    }
    .handover-text {
      color: #c0c0c0;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    #screen-handover {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .handover-scroll-area {
      flex: 1;
      overflow-y: auto;
    }
    .handover-empty {
      text-align: center;
      font-size: 14px;
      color: #777;
      padding: 32px 20px;
    }
    .checkin-area {
      flex-shrink: 0;
      padding: 20px 20px 24px;
      border-top: 1px solid #2a2a24;
      background-color: #0d0d0b;
    }
    .checkin-btn {
      width: 100%;
      padding: 16px;
      background: #1e1a10;
      border: 1px solid #c5a059;
      border-radius: 12px;
      color: #c5a059;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .checkin-btn:active {
      background: #2a2210;
    }

    /* ── 画面3: 作業中 ── */
    #screen-working {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .working-monitor {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 20px 16px;
      border-top: 1px solid #c5a059;
      border-bottom: 1px solid #1e1e1a;
    }
    .working-site-name {
      color: #e8e5df;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    .working-checkin-time {
      color: #a0a0a0;
      font-size: 12px;
      margin-top: 4px;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.08em;
    }
    .working-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 20px 20px;
      background: #0d0d0b;
    }
    .action-btn {
      width: 100%;
      padding: 20px;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      border: 1px solid;
      background: none;
      text-align: left;
    }
    .btn-main-text {
      font-size: 17px;
      font-weight: 500;
    }
    .btn-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      opacity: 0.6;
      font-family: 'Noto Serif JP', serif;
      width: 100%;
    }
    .btn-sos {
      background: #2a1205;
      border-color: #d95b29;
      color: #f0ede8;
      min-height: 120px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 0 12px rgba(217, 91, 41, 0.4),
                  0 0 24px rgba(217, 91, 41, 0.2);
    }
    .btn-sos:active {
      background: #3a1a08;
      box-shadow: 0 0 6px rgba(217, 91, 41, 0.3);
    }
    .btn-sos .btn-sub { color: #d95b29; width: auto; }
    .action-row {
      display: flex;
      gap: 10px;
    }
    .action-row .action-btn {
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 80px;
    }
    .action-row .action-btn .btn-sub { width: auto; }
    .btn-photo {
      background: #161614;
      border-color: #2a2a24;
      color: #e8e5df;
    }
    .btn-photo:active { background: #1e1e1a; }
    .btn-photo .btn-sub { color: #777; }
    .btn-memo {
      background: #161614;
      border-color: #2a2a24;
      color: #e8e5df;
    }
    .btn-memo:active { background: #1e1e1a; }
    .btn-memo .btn-sub { color: #777; }
    .btn-return {
      background: #161614;
      border-color: #c5a059;
      color: #a0a0a0;
    }
    .btn-return:active { background: #1e1e1a; }
    .btn-return .btn-sub { color: #c5a059; }
    .btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    /* ── レスポンシブ ── */
    @media (max-width: 480px) {
      .site-slug    { font-size: 16px; }
      .site-address { font-size: 13px; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .site-slug    { font-size: 18px; }
      .site-address { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="app">

  <!-- ── 画面1: 現場トップ ── -->
  <div id="screen-site-top" class="screen active">
    <div class="site-top-header">
      <p class="site-top-eyebrow">SENLINGS</p>
      <h1 class="site-top-heading">今日はどこへ入りますか？</h1>
    </div>

    <div class="site-list" id="site-list">
      <!-- app_v2.js が描画 -->
    </div>

    <div class="site-fallback">
      <p class="site-fallback-label">現場が見つからない場合</p>
      <div class="site-fallback-links">
        <button class="site-fallback-link" id="btn-contact-manager">担当者へ確認する</button>
        <button class="site-fallback-link" id="btn-add-site">現場を追加する</button>
      </div>
    </div>
  </div>

  <!-- ── 画面2: 申し送り ── -->
  <div id="screen-handover" class="screen">
    <div class="screen-header">
      <button class="back-btn" id="btn-back-handover">‹</button>
      <span class="screen-title" id="handover-site-name"></span>
    </div>
    <p class="screen-subtitle">入る前に、ここだけ確認</p>
    <div class="handover-scroll-area">
      <div id="handover-list"></div>
    </div>
    <div class="checkin-area">
      <button class="checkin-btn" id="btn-checkin">入館・作業開始</button>
    </div>
  </div>

  <!-- ── 画面3: 作業中 ── -->
  <div id="screen-working" class="screen">
    <div class="working-monitor">
      <div class="working-site-name" id="working-site-name"></div>
      <div class="working-checkin-time" id="working-checkin-time"></div>
    </div>
    <div class="working-actions">

      <!-- 主役：迷ったら押す -->
      <button class="action-btn btn-sos" id="btn-sos">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="btn-main-text">迷ったら押す</span>
        <span class="btn-sub">救助信号 / SIGNAL</span>
      </button>

      <!-- 実務：撮影・メモ（2列） -->
      <div class="action-row">
        <button class="action-btn btn-photo" id="btn-photo">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="btn-main-text">撮影</span>
          <span class="btn-sub">PHOTO</span>
        </button>
        <button class="action-btn btn-memo" id="btn-memo">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="btn-main-text">メモ</span>
          <span class="btn-sub">MEMO</span>
        </button>
      </div>

      <!-- 儀式：今日を返す -->
      <button class="action-btn btn-return" id="btn-return">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M2 20L8 8l4 6 4-4 6 10H2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="btn-main-text">今日を返す</span>
        <span class="btn-sub">山返し / RETURN</span>
      </button>

    </div>
  </div>

  <!-- ── 下部タブバー（全画面共通） ── -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="genba">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 20 L12 4 L22 20 Z" fill="currentColor"/>
      </svg>
      <span class="tab-label">現場</span>
    </button>
    <button class="tab" data-tab="shimai">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3 L21 12 L12 21 L3 12 Z" fill="currentColor"/>
      </svg>
      <span class="tab-label">仕舞い</span>
    </button>
  </nav>

  </div><!-- /#app -->
  <script type="module" src="app_v2.js"></script>
</body>
</html>
