<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senlings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0d0d0b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── リセット・ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0b;
      color: #e8e4d8;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ── アプリコンテナ（幅制御） ── */
    #app {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── 画面コンテナ ── */
    .screen {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 0 0 80px;
      width: 100%;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ── 下部タブバー ── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      background: #0d0d0b;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px 20px;
      background: none;
      border: none;
      border-top: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
      gap: 5px;
    }
    .tab .tab-icon-svg {
      width: 22px;
      height: 22px;
      color: #a0a0a0;
    }
    .tab .tab-label {
      font-size: 11px;
      color: #a0a0a0;
      letter-spacing: 0.12em;
      font-family: 'Noto Serif JP', serif;
      font-weight: 500;
    }
    .tab.active {
      border-top: 2px solid #c5a059;
      box-shadow: 0 -2px 8px rgba(197, 160, 89, 0.3);
    }
    .tab.active .tab-icon-svg { color: #c5a059; }
    .tab.active .tab-label    { color: #c5a059; font-weight: 700; }
    .tab-icon-svg {
      display: block;
    }

    /* ── 画面1: 現場トップ ── */
    .site-top-header {
      padding: 28px 20px 16px;
    }
    .site-top-eyebrow {
      color: #c5a059;
      font-size: 11px;
      letter-spacing: 0.4em;
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    .site-top-heading {
      font-size: 20px;
      font-weight: 300;
      color: #e8e4d8;
      line-height: 1.5;
    }

    /* 現場カード一覧 */
    .site-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .site-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      padding: 18px 20px 18px 24px;
      min-height: 72px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-left: 4px solid #c5a059;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .site-card:active {
      background: #1e1e1a;
      border-color: #333;
    }
    .site-slug {
      font-size: 18px;
      font-weight: 500;
      color: #e8e5df;
      letter-spacing: 0.05em;
    }
    .site-address {
      font-size: 14px;
      font-weight: 300;
      color: #c0c0c0;
    }

    /* 空状態 */
    .site-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: #4a4a42;
      font-weight: 300;
    }

    /* 「現場が見つからない場合」導線 */
    .site-fallback {
      margin: 28px 20px 0;
      padding: 0;
    }
    .site-fallback-label {
      font-size: 12px;
      color: #888880;
      margin-bottom: 12px;
      letter-spacing: 0.15em;
      font-family: 'Noto Serif JP', serif;
    }
    .site-fallback-links {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .site-fallback-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #1e1e1a;
      font-size: 14px;
      color: #e8e5df;
      font-weight: 300;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }
    .site-fallback-link::after {
      content: '›';
      font-size: 18px;
      color: #c5a059;
    }
    .site-fallback-link:last-child { border-bottom: none; }

    /* ── 画面2: 申し送り ── */
    .screen-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1a;
      gap: 12px;
    }
    .back-btn {
      color: #c5a059;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      font-family: inherit;
      line-height: 1;
    }
    .screen-title {
      color: #e8e5df;
      font-size: 16px;
      font-weight: 500;
    }
    .screen-subtitle {
      font-family: 'Noto Serif JP', serif;
      color: #a0a0a0;
      font-size: 12px;
      padding: 12px 20px 8px;
      letter-spacing: 0.1em;
    }
    .handover-item {
      border-bottom: 1px solid #1e1e1a;
    }
    .handover-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .handover-label {
      color: #e8e5df;
      font-size: 15px;
      font-weight: 400;
    }
    .handover-chevron {
      color: #c5a059;
      font-size: 18px;
      transition: transform 0.2s;
    }
    .handover-item.open .handover-chevron {
      transform: rotate(90deg);
    }
    .handover-body {
      padding: 0 20px 16px 20px;
    }
    .handover-text {
      color: #c0c0c0;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    #screen-handover {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .handover-scroll-area {
      flex: 1;
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .handover-scroll-area::-webkit-scrollbar {
      display: none;
    }
    .handover-empty {
      text-align: center;
      font-size: 14px;
      color: #777;
      padding: 32px 20px;
    }
    .checkin-area {
      flex-shrink: 0;
      padding: 20px 20px 24px;
      border-top: 1px solid #2a2a24;
      background-color: #0d0d0b;
    }
    .checkin-btn {
      width: 100%;
      padding: 16px;
      background: #1e1a10;
      border: 1px solid #c5a059;
      border-radius: 12px;
      color: #c5a059;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .checkin-btn:active {
      background: #2a2210;
    }

    /* ── 画面3: 作業中 ── */
    #screen-working {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .working-monitor {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 0;
      border-top: 1px solid #c5a059;
      border-bottom: 1px solid #1e1e1a;
    }
    .working-site-name {
      color: #e8e5df;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    .working-checkin-time {
      color: #a0a0a0;
      font-size: 12px;
      margin-top: 4px;
      padding-left: 52px;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.08em;
    }
    .working-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 20px 20px;
      background: #0d0d0b;
    }
    .action-btn {
      width: 100%;
      padding: 20px;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      border: 1px solid;
      border-top: 1px solid rgba(232, 229, 223, 0.25);
      background: none;
      text-align: left;
      box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .btn-main-text {
      font-size: 17px;
      font-weight: 500;
    }
    .btn-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      opacity: 0.6;
      font-family: 'Noto Serif JP', serif;
      width: 100%;
    }
    .btn-sos {
      background: radial-gradient(
        ellipse at center,
        #3d1a08 0%,
        #2a1205 50%,
        #1a0c03 100%
      );
      border-color: #d95b29;
      border-top: 1px solid rgba(217, 91, 41, 0.4);
      color: #f0ede8;
      min-height: 120px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 0 12px rgba(217, 91, 41, 0.4),
                  0 0 24px rgba(217, 91, 41, 0.2),
                  inset 0 -1px 0 rgba(0, 0, 0, 0.6),
                  inset 0 1px 0 rgba(217, 91, 41, 0.2);
    }
    .btn-sos:active {
      background: radial-gradient(
        ellipse at center,
        #4a2010 0%,
        #3a1a08 50%,
        #2a1205 100%
      );
      box-shadow: 0 0 6px rgba(217, 91, 41, 0.3);
    }
    .btn-sos .btn-sub { color: #d95b29; width: auto; }
    .action-row {
      display: flex;
      gap: 10px;
    }
    .action-row .action-btn {
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 80px;
    }
    .action-row .action-btn .btn-sub { width: auto; }
    .btn-photo {
      background: #161614;
      border-color: #2a2a24;
      color: #e8e5df;
    }
    .btn-photo:active { background: #1e1e1a; }
    .btn-photo .btn-sub { color: #777; }
    .btn-memo {
      background: #161614;
      border-color: #2a2a24;
      color: #e8e5df;
    }
    .btn-memo:active { background: #1e1e1a; }
    .btn-memo .btn-sub { color: #777; }
    .btn-return {
      background: #161614;
      border-color: #c5a059;
      color: #a0a0a0;
    }
    .btn-return:active { background: #1e1e1a; }
    .btn-return .btn-sub { color: #c5a059; }
    .btn-rest {
      background: #161614;
      border: 1px solid #2a2a24;
      color: #e8e5df;
    }
    .btn-rest:active { background: #1e1e1a; }
    .btn-rest .btn-sub { color: #777; }
    .btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    /* ── 画面3-B: 休憩 ── */
    #screen-rest .working-monitor {
      flex: none;     /* ヘッダーを自然な高さに固定 */
    }
    #screen-rest {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .rest-map-section {
      padding: 20px 20px 0;
    }
    .rest-map-label {
      color: #777;
      font-size: 11px;
      letter-spacing: 0.15em;
      font-family: 'Noto Serif JP', serif;
      margin-bottom: 12px;
    }
    .rest-map-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .rest-cat-btn {
      background: #161614;
      border: 1px solid #2a2a24;
      border-top: 1px solid rgba(232, 229, 223, 0.15);
      border-radius: 20px;
      color: #e8e5df;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .rest-cat-btn:active {
      background: #1e1e1a;
      border-color: #c5a059;
    }
    .rest-map-placeholder {
      background: #161614;
      border: 1px dashed #2a2a24;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: #444;
      font-size: 13px;
      line-height: 2;
    }
    .rest-map-note {
      font-size: 11px;
      color: #333;
      font-family: 'Noto Serif JP', serif;
    }

    /* ── 画面4: SOS ── */
    #screen-sos {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    #screen-sos .working-monitor {
      flex: none;
    }
    .sos-option {
      width: 100%;
      padding: 16px 20px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-top: 1px solid rgba(232, 229, 223, 0.15);
      border-radius: 12px;
      color: #e8e5df;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .sos-option:active { background: #1e1e1a; }
    .sos-option.selected {
      background: #1e1a10;
      border-color: #c5a059;
      color: #c5a059;
    }
    .sos-option.danger {
      border-color: #d95b29;
      color: #d95b29;
    }
    .sos-option.danger.selected {
      background: #2a1205;
      border-color: #d95b29;
      color: #f0ede8;
    }
    .sos-check {
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .sos-option.selected .sos-check { opacity: 1; }
    .sos-memo {
      width: 100%;
      padding: 12px 16px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-radius: 12px;
      color: #e8e5df;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      min-height: 80px;
      box-sizing: border-box;
    }
    .sos-memo:focus {
      outline: none;
      border-color: #444;
    }
    .sos-memo::placeholder { color: #3a3a32; }
    .sos-memo-label {
      color: #4a4a42;
      font-size: 11px;
      letter-spacing: 0.15em;
      font-family: 'Noto Serif JP', serif;
      margin-bottom: 8px;
    }
    .sos-send-btn {
      width: 100%;
      padding: 16px;
      background: #1e1a10;
      border: 1px solid #c5a059;
      border-radius: 12px;
      color: #c5a059;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .sos-send-btn:active { background: #2a2210; }
    .sos-send-btn:disabled {
      border-color: #2a2a24;
      color: #444;
      cursor: not-allowed;
    }

    /* ── SOS送信完了モーダル ── */
    .sos-modal {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 9, 0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      animation: sos-fadein 0.4s ease;
    }
    .sos-modal[hidden] { display: none; }
    @keyframes sos-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .sos-modal-inner {
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .sos-complete-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 24px;
      font-weight: 400;
      color: #e8e5df;
      letter-spacing: 0.08em;
      text-align: center;
      animation: sos-fadein 0.8s ease;
    }
    .sos-complete-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      color: #777;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .sos-modal-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: 1px solid;
      border-top: 1px solid rgba(232, 229, 223, 0.15);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .sos-call-btn {
      background: #2a1205;
      border-color: #d95b29;
      color: #f0ede8;
    }
    .sos-call-btn:active { background: #3a1a08; }
    .sos-call-note {
      font-size: 11px;
      color: #d95b29;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.05em;
      font-weight: 400;
    }
    .sos-wait-btn {
      background: #161614;
      border-color: #2a2a24;
      color: #e8e5df;
    }
    .sos-wait-btn:active { background: #1e1e1a; }
    .sos-modal-link {
      background: none;
      border: none;
      color: #a0a0a0;
      font-size: 15px;
      font-family: 'Noto Serif JP', serif;
      cursor: pointer;
      padding: 8px;
      letter-spacing: 0.05em;
      text-decoration: underline;
      text-decoration-color: #555;
      text-underline-offset: 4px;
    }
    .sos-modal-link:active { color: #888; }

    /* ── 画面5: 山返し ── */
    #screen-return .working-monitor {
      flex: none;
    }
    #screen-return {
      flex: none;
      height: calc(100dvh - 60px);
      overflow: hidden;
      padding: 0;
    }
    .return-section-label {
      color: #a0a0a0;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-family: 'Noto Serif JP', serif;
      margin-bottom: 10px;
    }
    .mood-btn {
      flex: 1;
      padding: 14px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-top: 1px solid rgba(232, 229, 223, 0.15);
      border-radius: 12px;
      color: #a0a0a0;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      text-align: center;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .mood-btn.selected {
      background: #1e1a10;
      border-color: #c5a059;
      color: #c5a059;
    }
    .mood-btn:active { background: #1e1e1a; }
    .category-btn {
      width: 100%;
      padding: 14px 20px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-top: 1px solid rgba(232, 229, 223, 0.15);
      border-radius: 12px;
      color: #e8e5df;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .category-btn.selected {
      background: #1e1a10;
      border-color: #c5a059;
      color: #c5a059;
    }
    .category-btn:active { background: #1e1e1a; }
    .category-check {
      opacity: 0;
      font-size: 14px;
      transition: opacity 0.15s;
    }
    .category-btn.selected .category-check { opacity: 1; }
    .return-memo {
      width: 100%;
      padding: 12px 16px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-radius: 12px;
      color: #e8e5df;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      min-height: 80px;
      box-sizing: border-box;
    }
    .return-memo:focus { outline: none; border-color: #444; }
    .return-memo::placeholder { color: #3a3a32; }
    .return-send-btn {
      width: 100%;
      padding: 16px;
      background: #161614;
      border: 1px solid #c5a059;
      border-radius: 12px;
      color: #c5a059;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Noto Serif JP', serif;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    .return-send-btn:active { background: #1e1a10; }

    /* ── 山返し完了モーダル ── */
    .return-complete-icon {
      font-size: 48px;
      margin-bottom: 8px;
      animation: ember-pulse 2s ease-in-out infinite;
    }
    @keyframes ember-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.95); }
    }
    .return-complete-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 22px;
      font-weight: 400;
      color: #e8e5df;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.7;
      animation: sos-fadein 0.8s ease;
    }
    .return-complete-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      color: #777;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    /* ── レスポンシブ ── */
    @media (max-width: 480px) {
      .site-slug    { font-size: 16px; }
      .site-address { font-size: 13px; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .site-slug    { font-size: 18px; }
      .site-address { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="app">

  <!-- ── 画面1: 現場トップ ── -->
  <div id="screen-site-top" class="screen active">
    <div class="site-top-header">
      <p class="site-top-eyebrow">SENLINGS</p>
      <h1 class="site-top-heading">今日はどこへ入りますか？</h1>
    </div>

    <div class="site-list" id="site-list">
      <!-- app_v2.js が描画 -->
    </div>

    <div class="site-fallback">
      <p class="site-fallback-label">現場が見つからない場合</p>
      <div class="site-fallback-links">
        <button class="site-fallback-link" id="btn-contact-manager">担当者へ確認する</button>
        <button class="site-fallback-link" id="btn-add-site">現場を追加する</button>
      </div>
    </div>
  </div>

  <!-- ── 画面2: 申し送り ── -->
  <div id="screen-handover" class="screen">
    <div class="screen-header">
      <button class="back-btn" id="btn-back-handover">‹</button>
      <span class="screen-title" id="handover-site-name"></span>
    </div>
    <p class="screen-subtitle">入る前に、ここだけ確認</p>
    <div class="handover-scroll-area">
      <div id="handover-list"></div>
    </div>
    <div class="checkin-area">
      <button class="checkin-btn" id="btn-checkin">入館・作業開始</button>
    </div>
  </div>

  <!-- ── 画面3: 作業中 ── -->
  <div id="screen-working" class="screen">
    <div class="working-monitor">
      <div class="screen-header">
        <button class="back-btn" id="btn-back-working">‹</button>
        <span class="screen-title" id="working-site-name"></span>
      </div>
      <div class="working-checkin-time" id="working-checkin-time"></div>
    </div>
    <div class="working-actions">

      <!-- 主役：迷ったら押す -->
      <button class="action-btn btn-sos" id="btn-sos">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="btn-main-text">迷ったら押す</span>
        <span class="btn-sub">救助信号 / SIGNAL</span>
      </button>

      <!-- 実務：撮影・メモ（2列） -->
      <div class="action-row">
        <button class="action-btn btn-photo" id="btn-photo">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="btn-main-text">撮影</span>
          <span class="btn-sub">PHOTO</span>
        </button>
        <button class="action-btn btn-memo" id="btn-memo">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="btn-main-text">メモ</span>
          <span class="btn-sub">MEMO</span>
        </button>
      </div>

      <!-- 休憩 -->
      <button class="action-btn btn-rest" id="btn-rest">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="btn-main-text">休憩</span>
        <span class="btn-sub">REST</span>
      </button>

      <!-- 儀式：今日を返す -->
      <button class="action-btn btn-return" id="btn-return">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
          <path d="M2 20L8 8l4 6 4-4 6 10H2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="btn-main-text">帰還</span>
        <span class="btn-sub">山返し / RETURN</span>
      </button>

    </div>
  </div>

  <!-- ── 画面3-B: 休憩 ── -->
  <div id="screen-rest" class="screen">

    <!-- ヘッダー -->
    <div class="working-monitor">
      <div class="screen-header">
        <button class="back-btn" id="btn-back-rest">‹</button>
        <span class="screen-title" id="rest-site-name"></span>
      </div>
      <div class="working-checkin-time" style="padding-left:52px;">休憩中</div>
    </div>

    <!-- スクロールエリア -->
    <div class="handover-scroll-area">

      <!-- 迷ったら押す（休憩中も表示） -->
      <div style="padding: 16px 20px 0;">
        <button class="action-btn btn-sos" id="btn-sos-rest">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="btn-main-text">迷ったら押す</span>
          <span class="btn-sub">救助信号 / SIGNAL</span>
        </button>
      </div>

      <!-- 周辺地図セクション -->
      <div class="rest-map-section">
        <p class="rest-map-label">周辺を探す</p>
        <div class="rest-map-categories">
          <button class="rest-cat-btn">🍜 ご飯・カフェ</button>
          <button class="rest-cat-btn">🚬 喫煙場所</button>
          <button class="rest-cat-btn">🏪 コンビニ</button>
          <button class="rest-cat-btn">🍱 お弁当屋</button>
          <button class="rest-cat-btn">🔨 ホームセンター</button>
          <button class="rest-cat-btn">⛽ ガソリンスタンド</button>
        </div>
        <div class="rest-map-placeholder">
          <p>地図はここに表示されます</p>
          <p class="rest-map-note">Google Maps連携は後日実装</p>
        </div>
      </div>

    </div>

    <!-- 作業再開ボタン（下部固定） -->
    <div class="checkin-area">
      <button class="checkin-btn" id="btn-resume">作業再開</button>
    </div>

  </div>

  <!-- ── 画面4: SOS ── -->
  <div id="screen-sos" class="screen">

    <!-- ヘッダー -->
    <div class="working-monitor">
      <div class="screen-header">
        <button class="back-btn" id="btn-back-sos">‹</button>
        <span class="screen-title" id="sos-site-name"></span>
      </div>
      <div class="working-checkin-time" style="padding-left:52px; font-family:'Noto Serif JP',serif; letter-spacing:0.1em;">
        困ったことを選んでください
      </div>
    </div>

    <!-- スクロールエリア -->
    <div class="handover-scroll-area">
      <div class="sos-options-list" id="sos-options-list"></div>

      <div style="padding: 20px 20px 0;">
        <p class="sos-memo-label">ひとこと（任意）</p>
        <textarea class="sos-memo" id="sos-memo"
          placeholder="わかる範囲で書いてください"></textarea>
      </div>
    </div>

    <!-- 送るボタン（下部固定） -->
    <div class="checkin-area">
      <button class="sos-send-btn" id="btn-sos-send" disabled>送る</button>
    </div>

  </div>

  <!-- ── 画面5: 山返し（帰還） ── -->
  <div id="screen-return" class="screen">

    <!-- ヘッダー -->
    <div class="working-monitor">
      <div class="screen-header">
        <button class="back-btn" id="btn-back-return">‹</button>
        <span class="screen-title" id="return-site-name"></span>
      </div>
      <div class="working-checkin-time"
        style="padding-left:52px; font-family:'Noto Serif JP',serif; letter-spacing:0.1em;">
        今日を、返す。
      </div>
    </div>

    <!-- スクロールエリア -->
    <div class="handover-scroll-area">
      <div style="display:flex; flex-direction:column; gap:20px; padding:20px;">

        <!-- また入りたいか -->
        <div>
          <p class="return-section-label">また入りたいですか？</p>
          <div style="display:flex; gap:10px;">
            <button class="mood-btn" data-mood="positive">また入りたい</button>
            <button class="mood-btn" data-mood="conditional">複雑な気持ち</button>
          </div>
        </div>

        <!-- 次に伝えたいこと -->
        <div>
          <p class="return-section-label">次に伝えたいこと</p>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="category-btn" data-cat="anzen">
              <span>危なかったこと</span>
              <span class="category-check">✓</span>
            </button>
            <button class="category-btn" data-cat="hinshitsu">
              <span>仕上がり・納まり</span>
              <span class="category-check">✓</span>
            </button>
            <button class="category-btn" data-cat="koutei">
              <span>段取り・待ち時間</span>
              <span class="category-check">✓</span>
            </button>
            <button class="category-btn" data-cat="genka">
              <span>追加・材料・経費</span>
              <span class="category-check">✓</span>
            </button>
          </div>
        </div>

        <!-- 次の人へ一言 -->
        <div>
          <p class="return-section-label">次の人へ一言（任意）</p>
          <textarea class="return-memo" id="return-memo"
            placeholder="搬入口は右側が使いやすい、など"></textarea>
        </div>

      </div>
    </div>

    <!-- 今日を返すボタン（下部固定） -->
    <div class="checkin-area">
      <button class="return-send-btn" id="btn-return-send">今日を、返す。</button>
    </div>

  </div>

  <!-- ── 下部タブバー（全画面共通） ── -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="genba">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 20 L12 4 L22 20 Z" fill="currentColor"/>
      </svg>
      <span class="tab-label">現場</span>
    </button>
    <button class="tab" data-tab="shimai">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3 L21 12 L12 21 L3 12 Z" fill="currentColor"/>
      </svg>
      <span class="tab-label">仕舞い</span>
    </button>
  </nav>

  </div><!-- /#app -->

  <!-- SOS送信完了モーダル -->
  <div id="sos-complete-modal" class="sos-modal" hidden>
    <div class="sos-modal-inner">

      <p class="sos-complete-title">伝わっています。</p>
      <p class="sos-complete-sub">止まるかどうかは、<br>あなたが決める。</p>

      <!-- 電話する（危ないのときのみ表示） -->
      <button class="sos-modal-btn sos-call-btn" id="btn-sos-call" hidden>
        電話する
        <span class="sos-call-note">危ないときは、待たずに</span>
      </button>

      <!-- このまま待つ -->
      <button class="sos-modal-btn sos-wait-btn" id="btn-sos-wait">
        このまま待つ
      </button>

      <!-- 別の救助信号も送る -->
      <button class="sos-modal-link" id="btn-sos-again">
        別の救助信号も送る
      </button>

    </div>
  </div>

  <!-- 山返し完了モーダル -->
  <div id="return-complete-modal" class="sos-modal" hidden>
    <div class="sos-modal-inner">

      <div class="return-complete-icon">🔥</div>

      <p class="return-complete-title">次のHunterへ、<br>届きます。</p>
      <p class="return-complete-sub">今日の現場は、終わりました。</p>

      <button class="sos-modal-btn sos-wait-btn" id="btn-return-complete">
        現場トップへ戻る
      </button>

    </div>
  </div>

  <script type="module" src="app_v2.js"></script>
</body>
</html>
