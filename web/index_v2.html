<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senlings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0d0d0b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── リセット・ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0b;
      color: #e8e4d8;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── 画面コンテナ ── */
    .screen {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 0 0 80px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ── 下部タブバー ── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: #0d0d0b;
      border-top: 1px solid #222;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px 20px;
      background: none;
      border: none;
      border-top: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
      gap: 5px;
    }
    .tab .tab-icon-svg {
      width: 20px;
      height: 20px;
      color: #444;
    }
    .tab .tab-label {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.12em;
      font-family: 'Noto Serif JP', serif;
    }
    .tab.active {
      border-top: 2px solid #c5a059;
      box-shadow: 0 -2px 8px rgba(197, 160, 89, 0.3);
    }
    .tab.active .tab-icon-svg { color: #e8e5df; }
    .tab.active .tab-label    { color: #c5a059; }
    .tab-icon-svg {
      display: block;
      stroke: currentColor;
      fill: none;
    }

    /* ── 画面1: 現場トップ ── */
    .site-top-header {
      padding: 28px 20px 16px;
    }
    .site-top-eyebrow {
      font-size: 12px;
      color: #4a4a42;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: 'Noto Serif JP', serif;
    }
    .site-top-heading {
      font-size: 20px;
      font-weight: 300;
      color: #e8e4d8;
      line-height: 1.5;
    }

    /* 現場カード一覧 */
    .site-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .site-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      padding: 18px 20px 18px 24px;
      min-height: 72px;
      background: #161614;
      border: 1px solid #2a2a24;
      border-left: 4px solid #c5a059;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .site-card:active {
      background: #1e1e1a;
      border-color: #333;
    }
    .site-slug {
      font-size: 18px;
      font-weight: 500;
      color: #e8e5df;
      letter-spacing: 0.05em;
    }
    .site-address {
      font-size: 14px;
      font-weight: 300;
      color: #c0c0c0;
    }

    /* 空状態 */
    .site-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: #4a4a42;
      font-weight: 300;
    }

    /* 「現場が見つからない場合」導線 */
    .site-fallback {
      margin: 28px 20px 0;
      padding: 0;
    }
    .site-fallback-label {
      font-size: 12px;
      color: #888880;
      margin-bottom: 12px;
      letter-spacing: 0.15em;
      font-family: 'Noto Serif JP', serif;
    }
    .site-fallback-links {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .site-fallback-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #1e1e1a;
      font-size: 14px;
      color: #e8e5df;
      font-weight: 300;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }
    .site-fallback-link::after {
      content: '›';
      font-size: 18px;
      color: #c5a059;
    }
    .site-fallback-link:last-child { border-bottom: none; }

    /* ── レスポンシブ ── */
    @media (max-width: 480px) {
      .site-slug    { font-size: 16px; }
      .site-address { font-size: 13px; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .screen  { max-width: 560px; }
      .tab-bar { max-width: 560px; }
      .site-slug    { font-size: 18px; }
      .site-address { font-size: 14px; }
    }

    @media (min-width: 769px) {
      .screen  { max-width: 480px; }
      .tab-bar { max-width: 480px; }
    }
  </style>
</head>
<body>

  <!-- ── 画面1: 現場トップ ── -->
  <div id="screen-site-top" class="screen active">
    <div class="site-top-header">
      <p class="site-top-eyebrow">SENLINGS</p>
      <h1 class="site-top-heading">今日はどこへ入りますか？</h1>
    </div>

    <div class="site-list" id="site-list">
      <!-- app_v2.js が描画 -->
    </div>

    <div class="site-fallback">
      <p class="site-fallback-label">現場が見つからない場合</p>
      <div class="site-fallback-links">
        <button class="site-fallback-link" id="btn-contact-manager">担当者へ確認する</button>
        <button class="site-fallback-link" id="btn-add-site">現場を追加する</button>
      </div>
    </div>
  </div>

  <!-- ── 下部タブバー（全画面共通） ── -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="genba">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none">
        <path d="M2 20 L12 4 L22 20 Z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="tab-label">現場</span>
    </button>
    <button class="tab" data-tab="shimai">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none">
        <path d="M12 3 L21 12 L12 21 L3 12 Z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="tab-label">仕舞い</span>
    </button>
  </nav>

  <script type="module" src="app_v2.js"></script>
</body>
</html>
