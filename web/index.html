<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senlings v0.10.0</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1rem; margin-top: 24px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    h3 { font-size: 0.9rem; color: #555; margin: 16px 0 8px; }
    button { padding: 10px 18px; margin: 4px 2px; font-size: 0.95rem; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status-display { font-weight: bold; margin: 8px 0; }
    #summary-display, #invoice-display { background: #f5f5f5; padding: 10px; margin-top: 8px; white-space: pre-wrap; font-size: 0.85rem; border-radius: 4px; min-height: 40px; }
    .warn { color: #c00; }

    /* プロジェクト一覧 */
    #project-list { list-style: none; padding: 0; margin: 8px 0; }
    #project-list li { padding: 6px 8px; background: #f0f0f0; border-radius: 4px; margin-bottom: 4px; font-size: 0.9rem; }

    /* 登録フォーム */
    #registration-form { display: none; background: #fafafa; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-top: 12px; }
    #registration-form.open { display: block; }
    .form-step { margin-bottom: 16px; }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 3px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 7px 9px; font-size: 0.9rem;
      border: 1px solid #bbb; border-radius: 4px;
    }
    .form-row input.error, .form-row select.error { border-color: #c00; }
    .field-error { color: #c00; font-size: 0.78rem; margin-top: 2px; }
    #project-id-preview { font-size: 0.8rem; color: #666; margin-top: 4px; font-family: monospace; }
    .optional { color: #999; font-size: 0.78rem; }
    #form-result { margin-top: 10px; font-size: 0.85rem; font-weight: bold; }
    #form-result.success { color: #080; }
    #form-result.error   { color: #c00; }

    /* ContactMaster 編集 */
    #contact-editor { display: none; margin-top: 12px; }
    #contact-editor.open { display: block; }
    .cm-row {
      display: grid;
      grid-template-columns: 3.5rem 1fr 1fr 1fr auto auto;
      gap: 4px;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.82rem;
    }
    .cm-row:first-child { font-weight: bold; color: #555; }
    .cm-row input[type="text"] {
      width: 100%; padding: 4px 6px; font-size: 0.82rem;
      border: 1px solid #ccc; border-radius: 3px;
    }
    .cm-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .cm-save-btn {
      padding: 4px 8px; font-size: 0.78rem; cursor: pointer;
      background: #444; color: #fff; border: none; border-radius: 3px;
      white-space: nowrap;
    }
    .cm-save-btn:disabled { opacity: 0.4; }
    .cm-saved { color: #080; font-size: 0.78rem; min-width: 2rem; text-align: center; }
    .cm-inactive { opacity: 0.45; }

    /* 現場選択ボタン */
    .project-select-btn {
      padding: 3px 10px; font-size: 0.8rem; cursor: pointer;
      background: #1a1a1a; color: #fff; border: none; border-radius: 3px;
      margin-left: 8px; vertical-align: middle;
    }

    /* 移動モード・現場モード パネル */
    #move-panel, #onsite-panel {
      display: none;
      background: #f0f4ff;
      border: 2px solid #3355cc;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    #onsite-panel { background: #f0fff4; border-color: #2a9d4e; }
    #move-panel.active, #onsite-panel.active { display: block; }
    .panel-title { font-size: 1rem; font-weight: bold; margin: 0 0 10px; }
    .panel-info { font-size: 0.85rem; margin-bottom: 12px; line-height: 1.7; }
    .panel-info strong { display: inline-block; min-width: 4em; color: #555; }
    .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .panel-actions button { flex: 1; padding: 12px; font-size: 0.95rem; font-weight: bold; }
    #btn-nav { background: #3355cc; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    #btn-arrive { background: #2a9d4e; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    #btn-exit-site { background: #888; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

    /* 経費フォーム */
    #expense-section { margin-top: 14px; border-top: 1px solid #b8d4b8; padding-top: 12px; }
    #expense-section h4 { font-size: 0.88rem; margin: 0 0 8px; color: #1a6b35; }
    #expense-form { display: flex; flex-direction: column; gap: 6px; }
    #expense-form select, #expense-form input[type="number"], #expense-form input[type="text"] {
      padding: 6px 8px; font-size: 0.88rem;
      border: 1px solid #aaa; border-radius: 4px; width: 100%;
    }
    #expense-form .expense-row { display: flex; gap: 6px; }
    #expense-form .expense-row select { flex: 1.4; }
    #expense-form .expense-row input  { flex: 1; }
    #btn-add-expense {
      padding: 8px; font-size: 0.88rem; font-weight: bold; cursor: pointer;
      background: #1a6b35; color: #fff; border: none; border-radius: 4px;
    }
    #expense-list { margin-top: 10px; font-size: 0.82rem; }
    #expense-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 2px; border-bottom: 1px solid #ddeedd;
    }
    #expense-list li .exp-label { color: #444; }
    #expense-list li .exp-amount { font-weight: bold; white-space: nowrap; }
    #expense-total { margin-top: 6px; font-size: 0.88rem; font-weight: bold; text-align: right; color: #1a6b35; }
    #expense-msg { font-size: 0.82rem; color: #080; min-height: 1.2em; }

    /* 集計・請求セレクター */
    .section-selector {
      display: flex; gap: 6px; align-items: center;
      flex-wrap: wrap; margin-bottom: 8px;
    }
    .section-selector select {
      flex: 1; padding: 6px 8px; font-size: 0.88rem;
      border: 1px solid #bbb; border-radius: 4px;
    }
    .section-selector input[type="number"] {
      width: 4.5rem; padding: 6px 8px; font-size: 0.88rem;
      border: 1px solid #bbb; border-radius: 4px; text-align: center;
    }
    .section-selector span { font-size: 0.85rem; color: #555; }
    .active-project-badge {
      display: inline-block; font-size: 0.78rem; background: #e8f0ff;
      border: 1px solid #99b0ee; border-radius: 3px;
      padding: 2px 7px; color: #3355cc; margin-bottom: 6px;
    }

    /* 日次サマリー */
    #daily-summary-display {
      background: #fffbf0; border: 1px solid #e0c97a;
      border-radius: 6px; padding: 12px; margin-top: 8px;
      font-size: 0.85rem; white-space: pre-wrap; line-height: 1.8;
      display: none;
    }
    #daily-summary-display.active { display: block; }
    #btn-go-home {
      background: #555; color: #fff; border: none;
      border-radius: 6px; cursor: pointer;
    }

    /* カメラオーバーレイ */
    #camera-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: #000;
      flex-direction: column;
    }
    #camera-overlay.active { display: flex; }

    #camera-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: rgba(0,0,0,0.7); color: #fff;
      font-size: 0.85rem; flex-shrink: 0;
    }
    #camera-project-label { font-weight: bold; }
    #camera-count { color: #aaa; }

    #camera-viewport { position: relative; flex: 1; overflow: hidden; }
    #camera-video {
      width: 100%; height: 100%; object-fit: cover;
    }
    #camera-thumbnail {
      position: absolute; inset: 0;
      display: none; object-fit: cover;
      width: 100%; height: 100%;
    }
    #camera-thumbnail.flash { display: block; }

    #camera-footer {
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 14px; background: rgba(0,0,0,0.8); flex-shrink: 0;
    }
    #camera-atmosphere {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; border-radius: 4px; padding: 7px 10px; font-size: 0.85rem;
      width: 100%;
    }
    #camera-atmosphere::placeholder { color: rgba(255,255,255,0.4); }
    #camera-actions { display: flex; gap: 10px; }
    #btn-shutter {
      flex: 1; padding: 16px; font-size: 1.1rem; font-weight: bold;
      background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer;
    }
    #btn-camera-close {
      padding: 16px 20px; font-size: 0.9rem;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; cursor: pointer;
    }

    /* 現場パネル内の写真一覧 */
    #photo-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    #photo-list img {
      width: 64px; height: 64px; object-fit: cover;
      border-radius: 4px; border: 1px solid #aaa; cursor: pointer;
    }
    .btn-open-camera {
      margin-top: 10px; padding: 10px; width: 100%; font-size: 0.9rem; font-weight: bold;
      background: #2a2a2a; color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
    .camera-error {
      margin-top: 6px; font-size: 0.82rem; color: #c00;
      min-height: 1em; white-space: pre-line; line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>Senlings</h1>

  <!-- ── 現場一覧 ── -->
  <section>
    <h2>現場一覧</h2>
    <ul id="project-list"><li>（登録なし）</li></ul>
    <button id="btn-new-project">＋ 新規現場を登録</button>

    <!-- 移動モードパネル -->
    <div id="move-panel">
      <p class="panel-title">🚗 移動モード</p>
      <div class="panel-info" id="move-info"></div>
      <div class="panel-actions">
        <button id="btn-nav">ナビ開始</button>
        <button id="btn-arrive">到着</button>
        <button id="btn-go-home">帰宅</button>
      </div>
      <button class="btn-open-camera" id="btn-open-camera-move">📷 カメラを起動</button>
      <div class="camera-error" id="move-camera-error"></div>
    </div>

    <!-- 現場モードパネル -->
    <div id="onsite-panel">
      <p class="panel-title">🏗 現場モード</p>
      <div class="panel-info" id="onsite-info"></div>
      <div class="panel-actions">
        <button id="btn-checkin">出勤</button>
        <button id="btn-checkout" disabled>退勤</button>
        <button id="btn-exit-site">終了</button>
      </div>

      <!-- カメラボタン + 写真一覧 -->
      <button class="btn-open-camera" id="btn-open-camera-onsite">📷 カメラを起動</button>
      <div class="camera-error" id="onsite-camera-error"></div>
      <div id="photo-list"></div>

      <!-- 経費入力 -->
      <div id="expense-section">
        <h4>経費を追加</h4>
        <div id="expense-form">
          <div class="expense-row">
            <select id="f-exp-category">
              <option value="parking">駐車場</option>
              <option value="toll">高速代</option>
              <option value="fuel">燃料</option>
              <option value="material_small">軽微材料</option>
              <option value="tool_rental">道具レンタル</option>
              <option value="other">その他</option>
            </select>
            <input type="number" id="f-exp-amount" placeholder="金額（円）" min="0" step="1" />
          </div>
          <input type="text" id="f-exp-memo" placeholder="メモ（任意）" />
          <button type="button" id="btn-add-expense">追加</button>
          <div id="expense-msg"></div>
        </div>
        <ul id="expense-list"></ul>
        <div id="expense-total"></div>
      </div>
    </div>

    <!-- 登録フォーム（3ステップ） -->
    <form id="registration-form" novalidate>

      <!-- STEP 1: 基本情報 -->
      <div class="form-step">
        <h3>STEP 1 — 基本情報</h3>

        <div class="form-row">
          <label>工期開始日 <span style="color:#c00">*</span></label>
          <input type="date" id="f-start-date" required />
          <div class="field-error" id="err-start-date"></div>
        </div>

        <div class="form-row">
          <label>現場略称（slug） <span style="color:#c00">*</span> <span class="optional">英数字・ハイフン・20文字以内</span></label>
          <input type="text" id="f-slug" placeholder="SHIBUYA-KAISO" maxlength="20" />
          <div id="project-id-preview"></div>
          <div class="field-error" id="err-slug"></div>
        </div>

        <div class="form-row">
          <label>住所 <span style="color:#c00">*</span></label>
          <input type="text" id="f-address" placeholder="東京都渋谷区…" />
          <div class="field-error" id="err-address"></div>
        </div>

        <div class="form-row">
          <label>工事コード <span class="optional">（任意・後日入力可）</span></label>
          <input type="text" id="f-project-code" placeholder="不明" />
        </div>
      </div>

      <!-- STEP 2: 現場窓口 -->
      <div class="form-step">
        <h3>STEP 2 — 現場窓口</h3>
        <div class="form-row">
          <label>担当者 <span style="color:#c00">*</span></label>
          <select id="f-contact">
            <option value="">— 選択してください —</option>
          </select>
          <div class="field-error" id="err-contact"></div>
        </div>
      </div>

      <!-- STEP 3: 攻略情報（任意） -->
      <div class="form-step">
        <h3>STEP 3 — 攻略情報 <span class="optional">（任意・不明可）</span></h3>

        <div class="form-row">
          <label>入口</label>
          <input type="text" id="f-entrance" placeholder="不明" />
        </div>
        <div class="form-row">
          <label>駐車場</label>
          <input type="text" id="f-parking" placeholder="不明" />
        </div>
        <div class="form-row">
          <label>搬入方法</label>
          <input type="text" id="f-delivery" placeholder="不明" />
        </div>
        <div class="form-row">
          <label>朝礼</label>
          <select id="f-morning-assembly">
            <option value="">不明</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="form-row">
          <label>特殊装備</label>
          <input type="text" id="f-equipment" placeholder="不明" />
        </div>
        <div class="form-row">
          <label>トイレ</label>
          <input type="text" id="f-toilet" placeholder="不明" />
        </div>
        <div class="form-row">
          <label>喫煙所</label>
          <input type="text" id="f-smoking" placeholder="不明" />
        </div>
      </div>

      <button type="submit" id="btn-submit-project">登録する</button>
      <button type="button" id="btn-cancel-project">キャンセル</button>
      <div id="form-result"></div>
    </form>
  </section>

  <!-- ── ContactMaster 編集 ── -->
  <section>
    <h2>ContactMaster</h2>
    <button id="btn-toggle-contacts">編集</button>
    <div id="contact-editor">
      <!-- ヘッダー行 -->
      <div class="cm-row">
        <span>ID</span>
        <span>氏名</span>
        <span>電話</span>
        <span>会社</span>
        <span>有効</span>
        <span></span>
        <span></span>
      </div>
      <!-- CM01〜CM10 は app.js が動的に生成 -->
      <div id="contact-rows"></div>
    </div>
  </section>

  <!-- ── 勤怠 ── -->
  <section>
    <h2>勤怠</h2>
    <p id="status-display">状態: Idle</p>
  </section>

  <!-- ── 日次サマリー ── -->
  <section>
    <h2>日次サマリー</h2>
    <button id="btn-daily-summary">今日のサマリー表示</button>
    <div id="daily-summary-display"></div>
  </section>

  <!-- ── 月次サマリー ── -->
  <section>
    <h2>月次サマリー</h2>
    <div class="section-selector">
      <select id="summary-project-select">
        <option value="">— 現場を選択 —</option>
      </select>
      <input type="number" id="summary-year"  min="2020" max="2099" />
      <span>/</span>
      <input type="number" id="summary-month" min="1" max="12" />
      <span>月</span>
    </div>
    <button id="btn-summary">サマリー表示</button>
    <div id="summary-display"></div>
  </section>

  <!-- ── 請求下書き ── -->
  <section>
    <h2>請求下書き</h2>
    <div class="section-selector">
      <select id="invoice-project-select">
        <option value="">— 現場を選択 —</option>
      </select>
      <input type="number" id="invoice-year"  min="2020" max="2099" />
      <span>/</span>
      <input type="number" id="invoice-month" min="1" max="12" />
      <span>月</span>
    </div>
    <button id="btn-invoice">請求下書き生成</button>
    <button id="btn-skip-expense" style="display:none">経費をスキップして確定</button>
    <div id="invoice-display"></div>
  </section>

  <!-- ── カメラオーバーレイ（全画面） ── -->
  <div id="camera-overlay">
    <div id="camera-header">
      <span id="camera-project-label"></span>
      <span id="camera-count"></span>
    </div>
    <div id="camera-viewport">
      <video id="camera-video" autoplay playsinline muted></video>
      <img id="camera-thumbnail" src="" alt="" />
    </div>
    <div id="camera-footer">
      <input type="text" id="camera-atmosphere" maxlength="100"
             placeholder="atmosphere（任意・100文字以内）" autocomplete="off" />
      <div id="camera-actions">
        <button id="btn-shutter">● 撮影</button>
        <button id="btn-camera-close">終了</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js")
          .then(reg => console.log("SW: Registered", reg.scope))
          .catch(err => console.error("SW: Registration failed", err));
      });
    }
  </script>
</body>
</html>
